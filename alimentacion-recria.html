<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alimentacion Recria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }

    #reporte {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #reporte.visible {
      opacity: 1;
    }

    #preauth {
      width: 0;
      height: 0;
      position: absolute;
      border: none;
      visibility: hidden;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: "Segoe UI", sans-serif;
      gap: 16px;
      z-index: 10;
    }

    #loader.oculto {
      display: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #0078D4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loader p {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Loader visible mientras carga -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Cargando reporte...</p>
  </div>

  <!-- iframe oculto que pre-autentica la sesión de Power BI -->
  <iframe
    id="preauth"
    src="https://app.powerbi.com/favicon.ico"
  ></iframe>

  <!-- iframe principal del reporte -->
  <iframe
    id="reporte"
    allowfullscreen
    title="Alimentacion Recria"
  ></iframe>

  <script>
    const REPORTE_URL = "https://app.powerbi.com/reportEmbed?reportId=4d1accc7-606a-4919-9500-cc3cf24e50c4&autoAuth=true&ctid=e6684c44-ece9-445e-8561-d274239534c5";

    const preauth  = document.getElementById('preauth');
    const reporte  = document.getElementById('reporte');
    const loader   = document.getElementById('loader');

    let reporteCargado = false;

    // Cuando el preauth termina, cargar el reporte principal
    preauth.onload = function () {
      reporte.src = REPORTE_URL;
    };

    // Cuando el reporte carga, ocultar el loader
    reporte.onload = function () {
      if (reporteCargado) return; // evitar doble disparo
      reporteCargado = true;

      loader.classList.add('oculto');
      reporte.classList.add('visible');
    };

    // Fallback: si el preauth tarda más de 3 segundos, cargar igual
    setTimeout(function () {
      if (!reporte.src || reporte.src === window.location.href) {
        reporte.src = REPORTE_URL;
      }
    }, 3000);
  </script>

</body>
</html>
